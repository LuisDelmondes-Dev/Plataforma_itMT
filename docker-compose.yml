# ITMT — ambiente de desenvolvimento (F1 MVP)
# sobe: PostgreSQL 16 com DDL+seed, API NestJS e Web Next.js
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: itmt
      POSTGRES_PASSWORD: itmt
      POSTGRES_DB: itmt
    ports: ["5432:5432"]
    volumes:
      - ./db/01-ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ./db/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./db/03-f1.sql:/docker-entrypoint-initdb.d/03-f1.sql:ro
      - ./db/04-f3.sql:/docker-entrypoint-initdb.d/04-f3.sql:ro
      - ./db/05-seed-f3.sql:/docker-entrypoint-initdb.d/05-seed-f3.sql:ro
      - ./db/06-f4.sql:/docker-entrypoint-initdb.d/06-f4.sql:ro
      - ./db/07-seed-f4.sql:/docker-entrypoint-initdb.d/07-seed-f4.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itmt"]
      interval: 3s
      retries: 20

  api:
    build: ./api
    environment:
      NODE_ENV: development          # dev: sem fail-fast de produção
      DATABASE_URL: postgres://itmt:itmt@db:5432/itmt
      PORT: "3001"
      # IA Xingú — sem chave, degrada para o intérprete léxico (RG-05)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      XINGU_MODELO: ${XINGU_MODELO:-claude-haiku-4-5}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-itmt-admin-dev}
    ports: ["3001:3001"]
    depends_on:
      db: { condition: service_healthy }

  web:
    build: ./web
    environment:
      API_URL: http://api:3001
    ports: ["3000:3000"]
    depends_on: [api]

  # RF-GEO-003 (WMS/WFS): habilite o perfil 'geo' para servir camadas
  # via GeoServer apontando para os objetos do geoportal.
  #   docker compose --profile geo up
  geoserver:
    image: kartoza/geoserver:2.25.0
    profiles: ["geo"]
    ports: ["8080:8080"]
    environment:
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-itmt-geoserver-dev}

volumes:
  pgdata:
