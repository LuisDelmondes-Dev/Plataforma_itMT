name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API — migrações + suíte e2e (DoD §18)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: itmt
          POSTGRES_PASSWORD: itmt
          POSTGRES_DB: itmt
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U itmt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://itmt:itmt@localhost:5432/itmt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Instalar dependências
        working-directory: api
        run: npm ci
      - name: Aplicar migrações (db/*.sql em ordem)
        working-directory: api
        run: npm run migrar
      - name: Suíte e2e — 44 testes, falha o build se procedência/vetos forem violados
        working-directory: api
        run: npm test
      - name: Verificador independente da cadeia de auditoria (RF-ADMIN-008)
        working-directory: api
        run: npm run verificar-cadeia

  web:
    name: Web — build Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Instalar dependências
        working-directory: web
        run: npm ci
      - name: Build de produção
        working-directory: web
        run: npm run build
